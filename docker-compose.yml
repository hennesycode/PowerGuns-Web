services:
  app:
    build: .
    container_name: powerguns-app
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=mysql://root:powerguns@mysql:3306/powerguns
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  mysql:
    image: mysql:8.4
    container_name: powerguns-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: powerguns
      MYSQL_DATABASE: powerguns
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
